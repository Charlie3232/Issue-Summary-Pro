<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設備研發部 - 問題解決資料庫</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="matrix-bg">

  <div id="login-overlay">
    <div class="pixel-box login-card anime-border">
      <div class="pixel-title">NEV_SYSTEM_ACCESS</div>
      <p class="pixel-text">同步率驗證：請輸入人員識別碼與密碼</p>
      <input type="text" id="login-user" class="pixel-input" placeholder="人員識別碼 (ID)..." style="margin-bottom:15px;">
      <input type="password" id="login-pwd" class="pixel-input" placeholder="密碼 (Password)...">
      <button class="pixel-btn btn-primary" onclick="handleLogin()" style="margin-top:20px; width:100%;">驗證啟動</button>
    </div>
  </div>

  <div id="main-ui" style="display:none;">
    <header class="anime-header">
      <div class="user-info-tag">USER: <span id="current-username">UNKNOWN</span></div>
      <h1 class="pixel-h1">設備研發部 - 問題解決資料庫</h1>
    </header>

    <div class="layout-container">
      <nav class="sidebar anime-border">
        <button class="nav-btn" id="btn-tab-main" onclick="switchTab('tab-main')" style="display:none;">儀表板<br><small>(Dashboard)</small></button>
        <button class="nav-btn active" id="btn-tab-issues" onclick="switchTab('tab-issues')">任務清單<br><small>(Issues)</small></button>
        <button class="nav-btn" id="btn-tab-manager" onclick="switchTab('tab-manager')" style="display:none; color: #ff0055;">主管事務管理<br><small>(Manager)</small></button>
        <button class="nav-btn logout-btn" onclick="location.reload()">系統登出</button>
      </nav>

      <main class="main-content">
        <div id="tab-main" class="tab-section" style="display:none;">
          <div class="stats-container anime-border">
            <h2 class="pixel-h1" style="font-size:20px; color: var(--pixel-green);">核心統計儀表板</h2>
            <div id="stats-bars"></div>
          </div>
        </div>

        <div id="tab-issues" class="tab-section">
          <div class="control-panel anime-border">
            <input type="text" id="search-input" class="pixel-input" placeholder="搜尋問題關鍵字..." oninput="renderIssues()">
            <div class="filter-group">
              <div class="custom-select"><div class="select-selected pixel-input" onclick="toggleDropdown('items-owner', event)">負責人 ▾</div><div class="select-items anime-border" id="items-owner" style="display:none;"></div></div>
              <div class="custom-select"><div class="select-selected pixel-input" onclick="toggleDropdown('items-status', event)">狀態 ▾</div><div class="select-items anime-border" id="items-status" style="display:none;"></div></div>
            </div>
            <button class="pixel-btn btn-add" onclick="openModal('TS')">+ 新增任務</button>
          </div>
          <div class="todo-grid" id="issue-display"></div>
        </div>

        <div id="tab-manager" class="tab-section" style="display:none;">
           </div>
      </main>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay">
    <div class="pixel-modal anime-theme">
      <div class="modal-header-bar"><span id="modal-title">DATABASE_ENTRY_V1.0</span><span class="pixel-close" onclick="closeModal()">[X]</span></div>
      <form id="issueForm" class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="field-grid-73">
          <div class="field-item"><label class="pixel-label">Issue (任務名稱)</label><input type="text" id="input-issue" class="pixel-input wide highlight-font" required></div>
          <div class="field-item"><label class="pixel-label">建立人</label><input type="text" id="input-creator" class="pixel-input wide" readonly style="color:#aaa;"></div>
        </div>
        
        <div class="field-grid-4">
          <div class="field-item"><label class="pixel-label">負責人</label><select id="input-owner" class="pixel-input" required></select></div>
          <div class="field-item"><label class="pixel-label">Status</label><select id="input-status" class="pixel-input" required></select></div>
          <div class="field-item"><label class="pixel-label">客戶別</label><select id="input-customer" class="pixel-input" required></select></div>
          <div class="field-item"><label class="pixel-label">產品別</label><select id="input-product" class="pixel-input" required></select></div>
        </div>

        <div class="field-grid">
          <div class="field-item"><label class="pixel-label">專案別</label><select id="input-project" class="pixel-input" required></select></div>
          <div class="field-item"><label class="pixel-label">預計完成日</label><input type="date" id="input-deadline" class="pixel-input date-picker-custom" required></div>
        </div>
        </form>
    </div>
  </div>

</body>
</html>
